<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Testify mental model visual spec</title>
  <desc id="desc">Prompt-ready SVG spec: show runner modules on the left, expectation modules on the right, and arrows from runners to expectations. The image should communicate that runners choose control flow while expectations choose semantics.</desc>
  <rect width="1200" height="720" fill="#f7f4ec"/>
  <text x="60" y="80" font-family="Georgia, serif" font-size="34" fill="#1d2a32">Testify mental model</text>
  <text x="60" y="118" font-family="Arial, sans-serif" font-size="18" fill="#43515b">Prompt/spec asset: refine later if you want a polished illustration.</text>

  <rect x="70" y="180" width="420" height="360" rx="24" fill="#fff8e8" stroke="#a36a00" stroke-width="3"/>
  <text x="100" y="228" font-family="Arial, sans-serif" font-size="28" fill="#6f4b00">Runner layer</text>
  <text x="100" y="275" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Assert.result</text>
  <text x="100" y="313" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Assert.should</text>
  <text x="100" y="365" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Check.result</text>
  <text x="100" y="403" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Check.should</text>
  <text x="100" y="455" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Check.resultBy</text>
  <text x="100" y="493" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">Check.shouldBy</text>
  <text x="100" y="532" font-family="Arial, sans-serif" font-size="18" fill="#43515b">Control flow: return a result or fail fast</text>

  <rect x="710" y="180" width="420" height="360" rx="24" fill="#eaf5ff" stroke="#1368aa" stroke-width="3"/>
  <text x="740" y="228" font-family="Arial, sans-serif" font-size="28" fill="#0f4b7a">Expectation layer</text>
  <text x="740" y="275" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">AssertExpectation</text>
  <text x="740" y="365" font-family="Consolas, monospace" font-size="24" fill="#1d2a32">CheckExpectation</text>
  <text x="740" y="418" font-family="Arial, sans-serif" font-size="18" fill="#43515b">Semantics: equality, projection, custom relation, exceptions</text>

  <path d="M510 310 C620 310, 620 310, 690 310" fill="none" stroke="#7f8c8d" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M510 430 C620 430, 620 430, 690 430" fill="none" stroke="#7f8c8d" stroke-width="5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
