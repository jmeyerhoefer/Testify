stages:
  - build

build_pdf:
  stage: build
  image: texlive/texlive:latest
  script:
    - mkdir -p output
    - pdflatex -output-directory=output ./template/thesis.tex
    - bibtex output/thesis.aux || true  # Handle bibliography
    - pdflatex -output-directory=output ./template/thesis.tex
    - pdflatex -output-directory=output ./template/thesis.tex
  artifacts:
    paths:
      - output/thesis.pdf
    expire_in: 1 week
