stages:
  - build

build-pdfs:
  stage: build
  image: texlive/texlive:latest # Or any LaTeX Docker image
  script:
    - mkdir -p output # Create an output directory for PDFs
    - pdflatex -output-directory output "./template/thesis.tex"
  artifacts:
    paths:
      - output/*.pdf # Store the compiled PDFs as artifacts
    expire_in: 1 week # Optional: Set expiration for the artifacts
